# Production overrides. Compose merges this on top of docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Provides: restart policies, HTTPS Caddy with the app + sandbox domains, and
# env-var wiring for the sandbox. Point DATABASE/REDIS/MinIO at managed services
# via .env for a real deployment (see docs/deployment.md) — the bundled
# postgres/redis/minio containers are convenient but not required in prod.
services:
  postgres:
    restart: unless-stopped
  redis:
    restart: unless-stopped
  minio:
    restart: unless-stopped

  api:
    restart: unless-stopped
    # ENV=production makes the API refuse to boot with insecure defaults.
    environment:
      ENV: production

  web:
    restart: unless-stopped

  caddy:
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
